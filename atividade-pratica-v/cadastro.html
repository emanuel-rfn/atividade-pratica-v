<!DOCTYPE html>
<html lang="pt=br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Cadastro</title>
</head>
<body>
    <body>
   <div class="signin">
        <h1>Xwitter</h1>
        <fieldset>
            <legend>Cadastre-se</legend>
            <form>
                <div>
                    <label for="name">Nome</label>
                    <input type="text" name="name">
                    <label for="surname">Sobrenome</label>
                    <input type="text" name="surname">
                    <label for="username">Nome de usuário</label>
                    <input type="text" name="username">
                </div>

                <div>
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for ="password">Senha</label>
                    <input type="password" name="password" required>
                    <label for ="confirm_pass">Confirmar senha</label>
                    <input type="confirm_pass" name="confirm_pass" required>
                </div>
                
                
                <div>
                    <input type="radio" id="homem" name="genre" value="homem">
                    <label for="homem">Homem</label>
                    <input type="radio" id="mulher" name="genre" value="mulher">
                    <label for="mulher">Mulher</label>
                    <input type="radio" id="genre" name="genre" value="Outro">
                    <label for="outro">Outro</label>
                </div>

                <div>
                    <label for="date">Data de nascimento</label>
                    <input type="date" name="date" id="date" required>
                </div>
                
                <a href="feed.html"><input type="submit" value="Criar conta"></a>
            </form>
        </fieldset>
        <p>Já possui uma conta?</p>
        <a href="index.html">Logar</a>
    </div>
</body>
</html>
